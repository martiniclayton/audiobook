<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Pratico 1</title>
</head>
<body>
    <h1>Teste pratico script</h1>
</body>

<script>
    // Exemplo antigo de código JavaScript usando var
    var usuario = { nome: "Ana", idade: 28, cidade: "Rio" };
    // Exemplo antigo de função para apresentar as informações do usuário
    function apresentar() {
        var nome = usuario.nome;
        var idade = usuario.idade;
        
        console.log("Olá, meu nome é " + nome + " e tenho " + idade + " anos.");
    }

    apresentar();

    // Exemplo moderno de código JavaScript usando let e const
    const usuario2 = {
        nome2: "Clayton",
        idade2: 28,
        cidade2: "São Paulo"
    }
    // Exemplo moderno de função para apresentar as informações do usuário usando template literals
    const {nome2, idade2, cidade2} = usuario2;

    const apresentar2 = () => {
        console.log(`Olá, meu nome é ${nome2}, tenho ${idade2} anos e moro em ${cidade2}.`);
    }

    apresentar2();
</script>
</html>
